<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Tareas</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="/styles.css">
        <script src="/app.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Administrador de tareas</h1>
        </header>
        <main>
            <section>
                <div class="input">
                    <input type="search" placeholder="Buscar una tarea" name="buscar" id="buscador"><br>    
                </div>
                <div class="input">
                    <form>
                        <input type="text" placeholder="Crear una tarea" name="input" id="creador">
                        <button id="boton" type="submit">Crear</button>
                    </form>
                </div>
            </section>
            <h2>Tareas:</h2>
            <section id="tareas">
            </section>
        </main>
    </body>
</html>
