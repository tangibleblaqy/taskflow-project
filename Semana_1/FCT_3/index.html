<!DOCTYPE html>
<html class="text-black dark:text-white bg-white dark:bg-[rgb(18,18,18)]">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Tareas</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="/main.js" defer></script>
        <link rel="stylesheet" href="/style.css">
        
        <link rel="stylesheet" href="/output.css">
    </head> 
    <body class="w-100vw h-100vh">
        <header class="flex justify-start m-0 p-2.5 border-b border-black dark:border-[rgb(128,128,128)] items-center dark:bg-[rgb(12,12,12)]">
            <h1 class="text-5xl p-1.5 inline-block">TASKBOARD</h1>
            <button id="tema" class="ml-auto mr-2.5 cursor-pointer transition-transform duration-200 hover:scale-110 text-black dark:text-white active:text-[rgb(128,128,128)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun-moon-icon lucide-sun-moon"><path d="M12 2v2"/><path d="M14.837 16.385a6 6 0 1 1-7.223-7.222c.624-.147.97.66.715 1.248a4 4 0 0 0 5.26 5.259c.589-.255 1.396.09 1.248.715"/><path d="M16 12a4 4 0 0 0-4-4"/><path d="m19 5-1.256 1.256"/><path d="M20 12h2"/></svg>
            </button>
        </header>
        <main>
            <section class="mt-5">
                <div class="input flex flex-col md:flex-row md:justify-center items-center p-2.5">
                    <form class="flex flex-col items-center p-3 rounded-2xl border border-black dark:border-[rgb(128,128,128)] m-2.5 transition-transform duration-200 hover:scale-110 dark:bg-[rgb(28,28,28)]">
                        <p class="p-1 pt-0 text-2xl inline-block font-['Times_New_Roman']">Crea tu tarea</p>
                        <div class="flex">
                            <input type="text" placeholder="Nombre de la tarea..." name="input" id="creador" class="border border-black dark:border-[rgb(128,128,128)] rounded-full p-1 pl-3 text-black dark:text-white dark:bg-[rgb(28,28,28)]">
                            <button id="boton" type="submit" class="cursor-pointer border border-black dark:border-[rgb(128,128,128)] rounded-full p-1 ml-1 transition-all duration-200 hover:scale-110 hover:bg-green-500 hover:border-green-500 hover:text-white">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-plus-icon lucide-calendar-plus"><path d="M16 19h6"/><path d="M16 2v4"/><path d="M19 16v6"/><path d="M21 12.598V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8.5"/><path d="M3 10h18"/><path d="M8 2v4"/></svg>
                            </button>
                        </div>
                    </form>
                    <div class="flex flex-col items-center p-3 rounded-2xl border border-black dark:border-[rgb(128,128,128)] m-2.5 transition-transform duration-200 hover:scale-110 dark:bg-[rgb(28,28,28)]">
                        <p class="p-1 pt-0 text-2xl inline-block font-['Times_New_Roman']">Encontrar tu tarea</p>
                        <div class="relative overflow-hidden">
                            <input type="search" placeholder="Buscar una tarea..." name="buscar" id="buscador" class="border border-black dark:border-[rgb(128,128,128)] rounded-full p-1 pl-3 pr-10 text-black dark:text-white dark:bg-[rgb(28,28,28)]">
                        </div> 
                    </div>
                </div>
                    
            </section>
            <div class="p-2.5 flex justify-center">
                <h2 class="p-2.5 text-3xl font-['Times_New_Roman'] border-b border-black dark:border-[rgb(128,128,128)]">Tareas actuales:</h2>
            </div>
            <section id="tareas" class="flex flex-col md:flex-row flex-wrap justify-center p-2.5 ">
            </section>
        </main>
    </body>
</html>
